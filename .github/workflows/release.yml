name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            goos: linux
            goarch: amd64
            artifact: claude-sandbox-linux-amd64
          - os: ubuntu-latest
            goos: linux
            goarch: arm64
            artifact: claude-sandbox-linux-arm64
          - os: macos-latest
            goos: darwin
            goarch: amd64
            artifact: claude-sandbox-darwin-amd64
          - os: macos-latest
            goos: darwin
            goarch: arm64
            artifact: claude-sandbox-darwin-arm64
          - os: windows-latest
            goos: windows
            goarch: amd64
            artifact: claude-sandbox-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Build binary
        run: |
          go build -o ${{ matrix.artifact }} -ldflags="-s -w" .
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0

      - name: Test binary
        run: |
          chmod +x ${{ matrix.artifact }} || true
          ./${{ matrix.artifact }} -h 2>&1 | head -1

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          files: artifacts/**/*
          draft: false
          prerelease: ${{ contains(github.ref, 'alpha') || contains(github.ref, 'beta') || contains(github.ref, 'rc') }}
